tunnel: ${CF_TUNNEL_ID}
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: rumie.xyz
    path: ^/assets/.*$
    service: http://minio:9000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  - hostname: rumie.xyz
    service: http://api:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  - service: http_status:404
